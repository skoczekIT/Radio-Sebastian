<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rádio Sebastián - Online</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: #0f172a; font-family: 'Inter', sans-serif; color: white;
            background: #0f172a url('http://151.243.169.248/static/uploads/radiosebastian/background.1774809202.png') no-repeat center center fixed;
            background-size: cover;
        }
        .player-card {
            background: rgba(15, 23, 42, 0.9); border: 2px solid #00f2ff;
            padding: 30px; border-radius: 25px; text-align: center; width: 320px;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.3);
            backdrop-filter: blur(10px);
        }
        .logo-circle {
            width: 140px; height: 140px; border-radius: 50%; border: 3px solid #00f2ff;
            margin: 0 auto 15px; overflow: hidden; animation: spin 12s linear infinite;
            animation-play-state: paused; background: #001a2b;
        }
        .logo-circle img { width: 100%; height: 100%; object-fit: cover; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .brand-name { font-weight: 900; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }
        .status-label { color: #00f2ff; font-weight: 700; font-size: 0.75rem; letter-spacing: 3px; margin-top: 10px; }
        
        #song-title { font-size: 1rem; margin: 15px 0; min-height: 3em; opacity: 0.9; }
        
        .play-btn {
            width: 70px; height: 70px; border-radius: 50%; border: none;
            background: #00f2ff; color: #0f172a; font-size: 1.5rem; cursor: pointer;
            transition: transform 0.3s ease; display: flex; align-items: center; justify-content: center; margin: 0 auto;
        }
        .play-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px rgba(0, 242, 255, 0.5); }
        
        .vol-cont { display: flex; align-items: center; gap: 10px; justify-content: center; margin-top: 20px; opacity: 0.8; }
        input[type="range"] { accent-color: #00f2ff; width: 130px; cursor: pointer; }
        
        .footer-info { margin-top: 25px; font-size: 0.7rem; color: rgba(255,255,255,0.5); }
    </style>
</head>
<body>

<div class="player-card">
    <div class="logo-circle" id="rsLogo">
        <img src="https://drive.google.com/thumbnail?id=1BAe4Sy78N_jHCzB5BH9JgtwN8BjBBokl&sz=500" alt="Logo">
    </div>
    
    <div class="brand-name">Rádio Sebastián</div>
    <div class="status-label">PRÁVĚ HRAJE</div>
    <div id="song-title">Načítání skladby...</div>
    
    <button class="play-btn" id="play-btn">
        <i class="fas fa-play" id="play-icon" style="margin-left: 5px;"></i>
    </button>

    <div class="vol-cont">
        <i class="fas fa-volume-down"></i>
        <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.8">
        <i class="fas fa-volume-up"></i>
    </div>

    <div class="footer-info">
        © 2026 Rádio Sebastián • Všechna práva vyhrazena
    </div>
</div>

<audio id="stream"></audio>

<script>
    const streamUrl = "http://151.243.169.248/radio/8000/radio.mp3";
    const audio = document.getElementById('stream');
    const btn = document.getElementById('play-btn');
    const icon = document.getElementById('play-icon');
    const rsLogo = document.getElementById('rsLogo');
    const songTitle = document.getElementById('song-title');

    btn.onclick = function() {
        if (audio.paused) {
            audio.src = streamUrl + "?ts=" + Date.now();
            audio.play().catch(err => {
                alert("Pro přehrávání na HTTPS je nutné povolit 'Nezabezpečený obsah' v nastavení prohlížeče (ikona zámku).");
            });
            icon.className = 'fas fa-pause';
            icon.style.marginLeft = "0px";
            rsLogo.style.animationPlayState = 'running';
        } else {
            audio.pause();
            audio.src = ""; 
            icon.className = 'fas fa-play';
            icon.style.marginLeft = "5px";
            rsLogo.style.animationPlayState = 'paused';
        }
    };

    document.getElementById('vol-slider').oninput = function() {
        audio.volume = this.value;
    };

    function updateSong() {
        fetch('http://151.243.169.248/api/nowplaying/radiosebastian')
            .then(res => res.json())
            .then(data => {
                songTitle.innerText = data.now_playing.song.text;
            })
            .catch(() => {
                songTitle.innerText = "Rádio Sebastián - Živě";
            });
    }

    updateSong();
    setInterval(updateSong, 15000);
</script>

</body>
</html>
