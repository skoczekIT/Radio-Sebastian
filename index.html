<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>RADIOSEBASTIAN - Player</title>

    <link rel="stylesheet" href="/static/vite_dist/assets/Layout-BnjlKdFv.css">
    <meta name="theme-color" content="#2196F3">

    <style>
        body {
            margin: 0;
            background: #001a2b;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .full-screen-center {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo-circle {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 3px solid #00f2ff;
            margin-bottom: 20px;
            overflow: hidden;
            animation: spin 12s linear infinite;
            animation-play-state: paused;
        }

        .logo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .brand-name {
            font-size: 2.5rem;
            font-weight: bold;
        }

        .play-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: white;
            font-size: 2rem;
            cursor: pointer;
            margin: 20px 0;
        }

        .vol-cont {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="range"] {
            width: 200px;
        }

        .footer {
            position: absolute;
            bottom: 10px;
            font-size: 0.8rem;
            opacity: 0.7;
        }
    </style>
</head>

<body>

<div class="full-screen-center">

    <div class="logo-circle" id="logo">
        <img src="https://drive.google.com/thumbnail?id=1BAe4Sy78N_jHCzB5BH9JgtwN8BjBBokl&sz=w500">
    </div>

    <div class="brand-name">Rádio Sebastián</div>

    <div>PRÁVĚ HRAJE</div>
    <div id="song">Načítám skladbu...</div>

    <button class="play-btn" id="play">▶</button>

    <div class="vol-cont">
        🔉
        <input type="range" id="vol" min="0" max="1" step="0.01" value="0.8">
        🔊
    </div>

    <div class="footer">
        © 2026 Rádio Sebastián • Všechna práva vyhrazena
    </div>

</div>

<audio id="audio" src="/radio/8000/radio.mp3"></audio>

<script>
const audio = document.getElementById('audio');
const btn = document.getElementById('play');
const logo = document.getElementById('logo');
const vol = document.getElementById('vol');

btn.onclick = () => {
    if (audio.paused) {
        audio.src = "/radio/8000/radio.mp3?ts=" + Date.now();
        audio.play();
        btn.innerText = "⏸";
        logo.style.animationPlayState = "running";
    } else {
        audio.pause();
        btn.innerText = "▶";
        logo.style.animationPlayState = "paused";
    }
};

vol.oninput = () => audio.volume = vol.value;

function updateSong() {
    fetch('/api/nowplaying/radiosebastian')
        .then(r => r.json())
        .then(data => {
            document.getElementById('song').innerText =
                data.now_playing.song.text;
        })
        .catch(() => {
            document.getElementById('song').innerText =
                "Rádio Sebastián - živě";
        });
}

updateSong();
setInterval(updateSong, 15000);
</script>

</body>
</html>
